<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="80" viewBox="0 0 1280 80" preserveAspectRatio="xMidYMid meet" role="img" aria-label="end of transmission">
  <defs>
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0"/>
      <stop offset="25%" stop-color="#00FFFF" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#00FFFF" stop-opacity="1"/>
      <stop offset="75%" stop-color="#00FFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="dGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="80" fill="#000000"/>

  <line x1="0" y1="32" x2="1280" y2="32" stroke="url(#dividerGrad)" stroke-width="1.5"/>

  <g transform="translate(540, 32)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#00FFFF" stroke-width="1" opacity="0.6"/>
    <circle cx="0" cy="0" r="2" fill="#00FFFF">
      <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(680, 32)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#00FFFF" stroke-width="1" opacity="0.6"/>
    <circle cx="60" cy="0" r="2" fill="#00FFFF">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(640, 32)" filter="url(#dGlow)">
    <g>
      <polygon points="0,-12 12,0 0,12 -12,0" fill="#000000" stroke="#00FFFF" stroke-width="2"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite"/>
    </g>
    <circle cx="0" cy="0" r="3" fill="#00FFFF">
      <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="640" y="62" text-anchor="middle" font-family="JetBrains Mono, Consolas, ui-monospace, monospace" font-size="10" fill="#00FFFF" opacity="0.65" letter-spacing="6">END · OF · TRANSMISSION</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="320" viewBox="0 0 1280 320" preserveAspectRatio="xMidYMid meet" role="img" aria-label="abdvlrqhman header">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00FFFF" stroke-width="0.4" opacity="0.18"/>
    </pattern>
    <pattern id="bigGrid" width="160" height="160" patternUnits="userSpaceOnUse">
      <path d="M 160 0 L 0 0 0 160" fill="none" stroke="#00FFFF" stroke-width="0.6" opacity="0.22"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="50%" r="65%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.92"/>
    </radialGradient>
    <linearGradient id="scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00FFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="320" fill="#000000"/>
  <rect width="1280" height="320" fill="url(#bigGrid)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect width="1280" height="320" fill="url(#vignette)"/>

  <line x1="0" y1="0" x2="1280" y2="0" stroke="#00FFFF" stroke-width="2"/>
  <line x1="0" y1="320" x2="1280" y2="320" stroke="#00FFFF" stroke-width="2"/>

  <g stroke="#00FFFF" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M 30 30 L 30 70 M 30 30 L 70 30">
      <animate attributeName="stroke" values="#00FFFF;#FFFFFF;#00FFFF" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M 1250 30 L 1250 70 M 1250 30 L 1210 30">
      <animate attributeName="stroke" values="#00FFFF;#FFFFFF;#00FFFF" dur="3s" begin="0.75s" repeatCount="indefinite"/>
    </path>
    <path d="M 30 290 L 30 250 M 30 290 L 70 290">
      <animate attributeName="stroke" values="#00FFFF;#FFFFFF;#00FFFF" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 1250 290 L 1250 250 M 1250 290 L 1210 290">
      <animate attributeName="stroke" values="#00FFFF;#FFFFFF;#00FFFF" dur="3s" begin="2.25s" repeatCount="indefinite"/>
    </path>
  </g>

  <line x1="60" y1="80" x2="1220" y2="80" stroke="url(#scan)" stroke-width="2" opacity="0.75">
    <animate attributeName="y1" values="80;240;80" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="80;240;80" dur="7s" repeatCount="indefinite"/>
  </line>

  <text x="378" y="102" font-family="JetBrains Mono, Consolas, ui-monospace, monospace" font-size="20" fill="#00FFFF" opacity="0.85">
    <tspan>&gt;_</tspan>
    <animate attributeName="opacity" values="0.85;0.25;0.85" dur="1.2s" repeatCount="indefinite"/>
  </text>
  <text x="418" y="102" font-family="JetBrains Mono, Consolas, ui-monospace, monospace" font-size="20" fill="#FFFFFF" opacity="0.75">whoami</text>

  <text x="640" y="180" text-anchor="middle" font-family="JetBrains Mono, Consolas, ui-monospace, monospace" font-size="76" font-weight="700" fill="#00FFFF" filter="url(#glow)">abdvlrqhman</text>

  <line x1="320" y1="200" x2="960" y2="200" stroke="#00FFFF" stroke-width="2" opacity="0.55" stroke-dasharray="640">
    <animate attributeName="stroke-dashoffset" values="640;0;-640" dur="5s" repeatCount="indefinite"/>
  </line>

  <text x="640" y="235" text-anchor="middle" font-family="JetBrains Mono, Consolas, ui-monospace, monospace" font-size="20" fill="#FFFFFF" opacity="0.92" filter="url(#softGlow)">Founder &amp; CEO @ Spacie.net</text>

  <text x="640" y="270" text-anchor="middle" font-family="JetBrains Mono, Consolas, ui-monospace, monospace" font-size="13" fill="#00FFFF" opacity="0.75" letter-spacing="6">PYTHON · JAVASCRIPT · CLOUD · DESIGN</text>

  <circle cx="100" cy="160" r="4" fill="#00FFFF">
    <animate attributeName="r" values="2;7;2" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1180" cy="160" r="4" fill="#00FFFF">

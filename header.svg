    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" begin="1.25s" repeatCount="indefinite"/>
  </circle>

  <circle cx="200" cy="80" r="1.5" fill="#FFFFFF" opacity="0">
    <animate attributeName="cy" values="80;240;80" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1080" cy="240" r="1.5" fill="#FFFFFF" opacity="0">
    <animate attributeName="cy" values="240;80;240" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="60" r="1.5" fill="#00FFFF" opacity="0">
    <animate attributeName="cy" values="60;260;60" dur="11s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="11s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="270" r="1.5" fill="#00FFFF" opacity="0">
    <animate attributeName="cy" values="270;70;270" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="50" r="1.5" fill="#FFFFFF" opacity="0">
    <animate attributeName="cy" values="50;270;50" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="780" cy="280" r="1.5" fill="#FFFFFF" opacity="0">
    <animate attributeName="cy" values="280;60;280" dur="13s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="13s" repeatCount="indefinite"/>
  </circle>
</svg>
